    @keyframes cardIn {

<body>
  <div id="root">
    <div id="msgs" class="top-right"></div>
  </div>

  <script>
    const msgs = document.getElementById('msgs');
    const MAX_CARDS = 5;
    let currentPos = 'top-right';

    function esc(str) {
      return String(str)
        .replace(/&/g, '&amp;')
        .replace(/</g, '&lt;')
        .replace(/>/g, '&gt;')
        .replace(/"/g, '&quot;');
    }

    function isLeftPos(pos) {
      return pos === 'top-left' || pos === 'bottom-left';
    }

    function updatePos(pos) {
      if (pos === currentPos) return;
      msgs.className = pos;
      currentPos = pos;
    }

    function removeCard(card) {
      if (card._removed) return;
      card._removed = true;
      const left = isLeftPos(currentPos);
      card.style.animation = left
        ? 'cardOutLeft 0.3s cubic-bezier(0.7,0,0.84,0) both'
        : 'cardOut 0.3s cubic-bezier(0.7,0,0.84,0) both';
      card.addEventListener('animationend', () => card.remove(), { once: true });
    }

    function showCard(data) {
      const { message: msg, duration, opacity, muteVideos } = data;

      // Supprimer les cartes en trop
      while (msgs.children.length >= MAX_CARDS) {
        removeCard(msgs.children[0]);
      }

      const card = document.createElement('div');
      card.className = 'card';
      card.style.opacity = opacity != null ? opacity : 1;

      if (isLeftPos(currentPos)) {
        card.style.animation = 'cardInLeft 0.38s cubic-bezier(0.16,1,0.3,1) both';
      }

      const uid = 'pb-' + msg.id + '-' + Date.now();
      let html = '';

      // ── Header ───────────────────────────────────
      html += `
        <div class="card-header">
          <img class="avatar"
               src="${esc(msg.avatar || '')}"
               onerror="this.style.display='none'"
               alt="" />
          <span class="author">${esc(msg.author || 'Inconnu')}</span>
        </div>
      `;

      // ── Texte ─────────────────────────────────────
      if (msg.content) {
        html += `<div class="card-text">${esc(msg.content)}</div>`;
      }

      // ── Pièces jointes ────────────────────────────
      (msg.attachments || []).forEach(att => {
        if (att.type === 'image') {
          html += `<img class="card-img" src="${esc(att.url)}" alt="" loading="eager" />`;
        } else if (att.type === 'gif') {
          html += `
            <div class="gif-wrap">
              <img src="${esc(att.url)}" alt="" loading="eager" />
              <span class="gif-badge">GIF</span>
            </div>`;
        } else if (att.type === 'gif-video') {
          html += `
            <div class="gif-wrap">
              <video src="${esc(att.url)}" autoplay loop muted playsinline></video>
              <span class="gif-badge">GIF</span>
            </div>`;
        } else if (att.type === 'video') {
          const muted = muteVideos ? 'muted' : '';
          html += `<video class="card-video" src="${esc(att.url)}" autoplay playsinline ${muted} controls></video>`;
        }
      });

      // ── Barre de progression ─────────────────────
      html += `
        <div class="card-foot">
          <div class="prog-track">
            <div class="prog-bar" id="${uid}"></div>
          </div>
        </div>
      `;

      card.innerHTML = html;
      msgs.appendChild(card);

      // Animer la barre : commence à 100 % → réduit à 0 sur `duration` ms
      const pb = card.querySelector('#' + uid);
      if (pb) {
        // Double rAF pour forcer le reflow avant de lancer la transition
        requestAnimationFrame(() => {
          requestAnimationFrame(() => {
            pb.style.transition = `transform ${duration}ms linear`;
            pb.style.transform = 'scaleX(0)';
          });
        });
      }

      // Suppression automatique
      const timer = setTimeout(() => removeCard(card), duration);
      card._timer = timer;
    }

    window.api.onOverlayMessage((data) => {
      updatePos(data.position || 'top-right');
      showCard(data);
    });
  </script>
</body>
</html>
